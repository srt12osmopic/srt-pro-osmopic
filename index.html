    <style>
        /* =========================================================
           🚀 THE ULTIMATE RESPONSIVE FIX (MOBILE + DESKTOP)
           ========================================================= */
        html, body {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden !important;
            background-color: var(--bg-secondary) !important;
        }

        /* 🚫 डेस्कटॉप पर मोबाइल जैसा सफेद डब्बा और शैडो हमेशा के लिए उड़ा दो */
        #wrapper, .app-container, .main-content, .container, .batches-page {
            max-width: 1200px !important; /* Wide layout for reference site look */
            width: 100% !important;
            margin: 0 auto !important;
            padding-left: 15px !important;
            padding-right: 15px !important;
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
            background: transparent !important;
        }

                /* 📱 + 💻 GRID MAGIC: मोबाइल पर 1-2, डेस्कटॉप पर 3-4 कार्ड्स ऑटोमैटिक सेट होंगे */
        .batches-container, #batches-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important; /* 320px se boxes bade honge */
            gap: 24px !important;
            width: 100% !important;
            max-width: 100% !important; 
            margin: 20px auto !important;
            padding: 10px 0 !important;
            justify-content: center !important;
            align-items: stretch !important;
        }


        /* कार्ड्स को ग्रिड के अंदर पूरा फैलने दो */
        .batch-card {
            width: 100% !important;
            max-width: 100% !important;
            margin: 0 !important;
        }

        /* =========================================================
           ── User's Original Layout & Community Styles ──
           ========================================================= */
        #wrapper {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        #animationCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: transparent;
        }

        /* ── Community Banner ── */
        .global-community-banner {
            width: 100%;
            max-width: 920px;
            margin: 0 auto 18px;
            padding: 0;
        }

        .community-banner-btn {
            width: 100%;
            padding: 14px 20px;
            background-color: var(--primary-color);
            color: #FFFFFF;
            border: 2px solid var(--primary-color);
            border-radius: var(--border-radius-lg);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition-fast);
            box-shadow: 0 0 0 0 rgba(90, 75, 218, 0.4), var(--card-shadow);
            position: relative;
        }

        .community-banner-btn:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            box-shadow: 0 0 0 4px rgba(90, 75, 218, 0.2), var(--card-shadow-hover);
            transform: translateY(-1px);
        }

        .community-banner-btn i {
            font-size: 18px;
        }

        .community-banner-btn .community-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #EF4444;
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            box-shadow: 0 2px 8px rgba(239, 68, 68, 0.4);
        }

        /* ── Community Popup ── */
        #srOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.55);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            padding: 20px;
            transition: opacity .18s ease;
        }

        #srPopup {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 24px;
            padding: 32px 24px 24px;
            text-align: center;
            position: relative;
            box-shadow: 0 15px 50px rgba(0,0,0,.18);
            animation: popupShow .25s ease;
            font-family: Arial, sans-serif;
        }

        #srClose {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            color: #111;
            transition: .2s ease;
        }

        #srClose:hover {
            background: #e5e7eb;
            transform: scale(1.08);
        }

        #srIcon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #229ED9, #25D366);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 36px;
            box-shadow: 0 10px 25px rgba(0,0,0,.15);
        }

        #srTitle {
            font-size: 28px;
            font-weight: 700;
            color: #111;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        #srSub {
            font-size: 15px;
            color: #666;
            line-height: 1.7;
            margin-bottom: 24px;
        }

        #srBtns {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .srBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 54px;
            border-radius: 14px;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: .2s ease;
        }

        .srBtn:hover {
            opacity: .92;
            transform: translateY(-1px);
        }

        .srBtn svg {
            margin-right: 10px;
            flex-shrink: 0;
        }

        .srTelegram { background: #229ED9; }
        .srWhatsapp { background: #25D366; }

        @keyframes popupShow {
            from { opacity: 0; transform: translateY(20px) scale(.95); }
            to   { opacity: 1; transform: none; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .global-community-banner {
                margin: 0 auto 15px;
            }

            .community-banner-btn {
                padding: 12px 18px;
                font-size: 15px;
            }

            .community-banner-btn i {
                font-size: 16px;
            }

            .community-banner-btn .community-badge {
                top: 6px;
                right: 6px;
                font-size: 10px;
                min-width: 18px;
                height: 18px;
            }
        }

        @media (max-width: 480px) {
            #srPopup  { padding: 28px 18px 20px; }
            #srTitle  { font-size: 24px; }
        }
    </style>
